apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 30m
  releaseName: flux-operator
  serviceAccountName: flux-operator
  chartRef:
    kind: OCIRepository
    name: flux-operator
  values:
    commonAnnotations:
      omni-kube-service-exposer.sidero.dev/port: "50080"
      omni-kube-service-exposer.sidero.dev/label: Flux UI
      omni-kube-service-exposer.sidero.dev/prefix: flux
    serviceMonitor:
      create: true
