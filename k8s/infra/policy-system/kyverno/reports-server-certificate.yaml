---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: reports-server-postgres-client-ca
spec:
  isCA: true
  commonName: reports-server-postgres-client-ca
  secretName: reports-server-postgres-client-ca-key-pair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: portableinfo-pmx01-root-ca-bootstrap
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: reports-server-postgres-client-ca-issuer
spec:
  ca:
    secretName: reports-server-postgres-client-ca-key-pair
---
apiVersion: v1
kind: Secret
metadata:
  name: reports-server-postgres-client-cert
  labels:
    cnpg.io/reload: ""
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: reports-server-postgres-client-cert
spec:
  secretName: reports-server-postgres-client-cert
  usages:
    - client auth
  commonName: reportsdb # user name
  issuerRef:
    name: reports-server-postgres-client-ca-issuer
    kind: Issuer
    group: cert-manager.io
