---
# Source: cluster/templates/podmonitor-cluster.yaml
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: reports-server-postgres-cluster-cluster-podmonitor
  namespace: policy-system
  labels:
    cnpg.io/cluster: reports-server-postgres-cluster
    helm.sh/chart: cluster-0.6.0
    app.kubernetes.io/name: cluster
    app.kubernetes.io/instance: reports-server-postgres
    app.kubernetes.io/part-of: cloudnative-pg
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: reports-server-postgres-cluster
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
      metricRelabelings:
        - action: replace
          regex: (.*)
          sourceLabels:
            - cluster
          targetLabel: cnpg_cluster
        - action: labeldrop
          regex: cluster
