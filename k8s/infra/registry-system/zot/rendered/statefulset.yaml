---
# Source: zot/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zot
  namespace: registry-system
  labels:
    helm.sh/chart: zot-0.1.114
    app.kubernetes.io/name: zot
    app.kubernetes.io/instance: zot
    app.kubernetes.io/version: "v2.1.16"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zot
      app.kubernetes.io/instance: zot
  minReadySeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: zot-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 60Gi
        storageClassName: "local-path"
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app.kubernetes.io/name: zot
        app.kubernetes.io/instance: zot
    spec:
      serviceAccountName: zot
      securityContext: null
      containers:
        - name: zot
          securityContext: null
          image: "ghcr.io/project-zot/zot:v2.1.16@sha256:bf6264b4f89b1b313fe64661b9eb9adf9fa851a5b66e15d5128976b3becabe0b"
          imagePullPolicy: IfNotPresent
          env:
            - name: GOGC
              value: "50"
            - name: GOMEMLIMIT
              value: 1600MiB
          ports:
            - name: zot
              containerPort: 5000
              protocol: TCP
          volumeMounts:
            - mountPath: '/var/lib/registry'
              name: zot-pvc
            - mountPath: '/etc/zot'
              name: zot-config
          livenessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: /livez
              port: 5000
              scheme: HTTP
          readinessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: /readyz
              port: 5000
              scheme: HTTP
          startupProbe:
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            httpGet:
              path: /startupz
              port: 5000
              scheme: HTTP
          resources:
            limits:
              memory: 2Gi
            requests:
              cpu: 350m
              memory: 1024Mi
      volumes:
        - name: zot-config
          configMap:
            name: zot-config
      dnsPolicy: ClusterFirst
