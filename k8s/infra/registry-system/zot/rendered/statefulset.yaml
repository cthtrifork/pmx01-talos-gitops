apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: zot
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: zot
    app.kubernetes.io/version: v2.1.17
    helm.sh/chart: zot-0.1.116
  name: zot
  namespace: registry-system
spec:
  minReadySeconds: 10
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: zot
      app.kubernetes.io/name: zot
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app.kubernetes.io/instance: zot
        app.kubernetes.io/name: zot
    spec:
      containers:
      - env:
        - name: GOGC
          value: "50"
        - name: GOMEMLIMIT
          value: 1600MiB
        - name: ZOT_CREDENTIALS_FILE
          value: /run/secrets/github_auth
        image: ghcr.io/project-zot/zot:v2.1.17@sha256:48b0c11c8c61a07246e047f22e02aad615816683fd8d8073b2862fb7ed0a3cc0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /livez
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 5
        name: zot
        ports:
        - containerPort: 5000
          name: zot
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 5
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 600m
            memory: 2Gi
        securityContext: null
        startupProbe:
          failureThreshold: 3
          httpGet:
            path: /startupz
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - mountPath: /var/lib/registry
          name: zot-pvc
        - mountPath: /etc/zot
          name: zot-config
        - mountPath: /etc/zot/sync
          name: zot-sync-creds
        - mountPath: /etc/zot/certs
          name: zot-certs
          readOnly: true
      dnsPolicy: ClusterFirst
      securityContext: null
      serviceAccountName: zot
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - configMap:
          name: zot-config
        name: zot-config
      - name: zot-sync-creds
        secret:
          secretName: zot-sync-creds
      - name: zot-certs
        secret:
          secretName: zot-certs
  volumeClaimTemplates:
  - metadata:
      name: zot-pvc
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 60Gi
      storageClassName: local-path
