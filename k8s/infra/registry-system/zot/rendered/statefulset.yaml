apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: zot
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: zot
    app.kubernetes.io/version: v2.1.16
    helm.sh/chart: zot-0.1.114
  name: zot
  namespace: registry-system
spec:
  minReadySeconds: 10
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: zot
      app.kubernetes.io/name: zot
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app.kubernetes.io/instance: zot
        app.kubernetes.io/name: zot
    spec:
      containers:
      - env:
        - name: GOGC
          value: "50"
        - name: GOMEMLIMIT
          value: 1600MiB
        image: ghcr.io/project-zot/zot:v2.1.16@sha256:bf6264b4f89b1b313fe64661b9eb9adf9fa851a5b66e15d5128976b3becabe0b
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /livez
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 5
        name: zot
        ports:
        - containerPort: 5000
          name: zot
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 5
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 350m
            memory: 1024Mi
        securityContext: null
        startupProbe:
          failureThreshold: 3
          httpGet:
            path: /startupz
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - mountPath: /var/lib/registry
          name: zot-pvc
        - mountPath: /etc/zot
          name: zot-config
      dnsPolicy: ClusterFirst
      securityContext: null
      serviceAccountName: zot
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - configMap:
          name: zot-config
        name: zot-config
  volumeClaimTemplates:
  - metadata:
      name: zot-pvc
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 60Gi
      storageClassName: local-path
