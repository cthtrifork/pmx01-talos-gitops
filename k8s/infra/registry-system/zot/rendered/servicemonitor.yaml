apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: metrics
  name: zot
  namespace: registry-system
spec:
  endpoints:
  - basicAuth:
      password:
        key: password
        name: basic-auth
      username:
        key: username
        name: basic-auth
    interval: 30s
    path: /metrics
    port: zot
  namespaceSelector:
    matchNames:
    - registry-system
  selector:
    matchLabels:
      app.kubernetes.io/instance: zot
      app.kubernetes.io/name: zot
