---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: registry-system
spec:
  chartRef:
    kind: OCIRepository
    name: zot
  releaseName: zot
  driftDetection:
    mode: enabled
  interval: 30m
  timeout: 10m
  install:
    disableWait: true
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
  upgrade:
    crds: CreateReplace
    disableWait: true
    cleanupOnFail: true
    remediation:
      retries: 3
  # https://github.com/project-zot/helm-charts/blob/main/charts/zot/values.yaml
  values:
    mountConfig: true
    service:
      type: ClusterIP
      port: 5000
    replicaCount: 1
    # todo: consider VPA
    image:
      repository: ghcr.io/project-zot/zot
      pullPolicy: IfNotPresent
      tag: "v2.1.16"
    persistence: true
    pvc:
      create: true
      accessModes: ["ReadWriteOnce"]
      storage: 8Gi
      # Name of the storage class to use if it is different than the default one
      storageClassName: "local-path"
    configFiles: ~
