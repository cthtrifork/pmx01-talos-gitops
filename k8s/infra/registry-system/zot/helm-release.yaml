---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: registry-system
spec:
  chartRef:
    kind: OCIRepository
    name: zot
  releaseName: zot
  driftDetection:
    mode: enabled
  interval: 30m
  timeout: 10m
  install:
    disableWait: true
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
  upgrade:
    crds: CreateReplace
    disableWait: true
    cleanupOnFail: true
    remediation:
      retries: 3
  # https://github.com/project-zot/helm-charts/blob/main/charts/zot/values.yaml
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"
    mountConfig: true
    service:
      type: ClusterIP
      port: 5000
    replicaCount: 1
    # todo: consider VPA
    image:
      repository: ghcr.io/project-zot/zot
      pullPolicy: IfNotPresent
      tag: "v2.1.17@sha256:48b0c11c8c61a07246e047f22e02aad615816683fd8d8073b2862fb7ed0a3cc0"
    persistence: true
    pvc:
      create: true
      accessModes: ["ReadWriteOnce"]
      storage: 60Gi
      # Name of the storage class to use if it is different than the default one
      storageClassName: ${DEFAULT_STORAGE_CLASS:=local-path}
    configFiles: ~
    # https://docs.giantswarm.io/tutorials/registry/zot/
    resources:
      requests:
        cpu: 600m
        memory: 2Gi
      limits:
        memory: 2Gi
    env:
      - name: GOGC
        # Keep it around 50, cannot be increased beyond 100
        value: "50"
      - name: GOMEMLIMIT
        # Set this to about 80% of the memory limit.
        value: 1600MiB
      - name: ZOT_CREDENTIALS_FILE
        value: "/run/secrets/github_auth"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    externalSecrets:
      - secretName: zot-sync-creds
        mountPath: /etc/zot/sync
    strategy:
      type: Recreate
    extraVolumes:
      - name: zot-certs
        secret:
          secretName: zot-tls-cert
    extraVolumeMounts:
      - name: zot-certs
        mountPath: /etc/zot/certs
        readOnly: true
  postRenderers:
    - kustomize:
        patches: # Tolerate the control plane taint
          - target:
              kind: StatefulSet
              name: zot
            patch: |
              - op: add
                path: /spec/template/spec/tolerations
                value:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoSchedule
