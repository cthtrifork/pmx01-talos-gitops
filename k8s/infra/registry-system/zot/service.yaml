apiVersion: v1
kind: Service
metadata:
  name: zot-lb
  namespace: registry-system
  annotations:
    omni-kube-service-exposer.sidero.dev/label: Zot registry
    omni-kube-service-exposer.sidero.dev/port: "50085"
    omni-kube-service-exposer.sidero.dev/prefix: zot
    metallb.io/loadBalancerIPs: 192.168.1.240
spec:
  type: LoadBalancer
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
  selector:
    app.kubernetes.io/name: zo