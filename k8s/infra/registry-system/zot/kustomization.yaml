apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: registry-system
resources:
  - helm-release.yaml
  - helm-repository.yaml
  - service.yaml
  - secret.enc.yaml
configMapGenerator:
  - name: zot-config
    namespace: registry-system
    options:
      disableNameSuffixHash: true
      labels:
        kyverno.io/watch: "true"
    files:
      - config.json=zot.json
secretGenerator:
  - name: zot-sync-creds
    namespace: registry-system
    options:
      disableNameSuffixHash: true
      labels:
        kyverno.io/watch: "true"
    files:
      - creds.json
generatorOptions:
  disableNameSuffixHash: true
