apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helm-release.yaml
  - helm-repository.yaml
configMapGenerator:
  - name: zot-config
    namespace: registry-system
    options:
      disableNameSuffixHash: true
      labels:
        kyverno.io/watch: "true"
    files:
      - config.json=zot.json
