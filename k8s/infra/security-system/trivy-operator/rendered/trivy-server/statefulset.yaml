---
# Source: trivy-operator/templates/trivy-server/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trivy-server
  namespace: security-system
  labels:
    app.kubernetes.io/name: trivy-server
    app.kubernetes.io/instance: trivy-server
spec:
  podManagementPolicy: "Parallel"
  serviceName: trivy-service
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy-server
      app.kubernetes.io/instance: trivy-server
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        resources:
          requests:
            storage: 5Gi
        accessModes:
          - ReadWriteOnce
        storageClassName:
  template:
    metadata:
      annotations:
        checksum/config: 7fcc66ace3f98462349856795765021e7bf7a0106f28439a9f6dc74257404370
      labels:
        kube-kraken.dk/mount-root-ca: "true"
        kube-kraken.dk/with-https-proxy: "true"
        app.kubernetes.io/name: trivy-server
        app.kubernetes.io/instance: trivy-server
    spec:
      serviceAccountName: trivy-operator
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: trivy-server
          image: "harbor./gcr-cache/aquasec/trivy:0.70.0@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e"
          imagePullPolicy: "IfNotPresent"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
          args:
            - server
          envFrom:
            - configMapRef:
                name: trivy-operator-trivy-config
            - secretRef:
                name: trivy-operator-trivy-config
          ports:
            - name: trivy-http
              containerPort: 4954
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /healthz
              port: trivy-http
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 10
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /healthz
              port: trivy-http
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - mountPath: /tmp
              name: tmp-data
              readOnly: false
            - mountPath: /home/scanner/.cache
              name: data
              readOnly: false
            - mountPath: /etc/trivy/trivy-config.yaml
              name: configfile
              subPath: trivy.configFile
          resources:
            limits:
              cpu: 1
              memory: 2Gi
            requests:
              cpu: 100m
              ephemeral-storage: 2Gi
              memory: 512Mi
      volumes:
        - name: tmp-data
          emptyDir: {}
        - configMap:
            name: trivy-operator-trivy-config
          name: configfile
      tolerations:
        - effect: NoSchedule
          key: kube-kraken/role
          operator: Equal
          value: tool
