---
# Source: trivy-operator/templates/configmaps/trivy.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-operator-trivy-config
  namespace: security-system
  labels:
    helm.sh/chart: trivy-operator-0.32.1
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/instance: trivy-operator
    app.kubernetes.io/version: "0.30.1"
    app.kubernetes.io/managed-by: Helm
data:
  trivy.repository: "zot.lan:5000/docker-hub-cache/aquasec/trivy"
  trivy.tag: "0.70.0@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e"
  trivy.imagePullPolicy: "IfNotPresent"
  trivy.additionalVulnerabilityReportFields: ""
  trivy.registry.mirror.docker.io: "zot.lan:5000/docker-hub-cache"
  trivy.registry.mirror.ghcr.io: "zot.lan:5000/ghcr-cache"
  trivy.registry.mirror.index.docker.io: "zot.lan:5000/docker-hub-cache"
  trivy.registry.mirror.mirror.gcr.io: "zot.lan:5000/docker-hub-cache"
  trivy.registry.mirror.quay.io: "zot.lan:5000/quay-cache"
  trivy.registry.mirror.registry-1.docker.io: "zot.lan:5000/docker-hub-cache"
  trivy.registry.mirror.registry.k8s.io: "zot.lan:5000/k8s-cache"
  trivy.severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
  trivy.slow: "false"
  trivy.skipJavaDBUpdate: "false"
  trivy.includeDevDeps: "false"
  trivy.imageScanCacheDir: "/tmp/trivy/.cache"
  trivy.filesystemScanCacheDir: "/var/trivyoperator/trivy-db"
  trivy.dbRepository: "zot.lan:5000/docker-hub-cache/aquasec/trivy-db"
  trivy.javaDbRepository: "zot.lan:5000/docker-hub-cache/aquasec/trivy-java-db"
  trivy.command: "image"
  trivy.sbomSources: ""
  trivy.dbRepositoryInsecure: "false"
  trivy.useBuiltinRegoPolicies: "false"
  trivy.useEmbeddedRegoPolicies: "true"
  trivy.supportedConfigAuditKinds: "Workload,Service,Role,ClusterRole,NetworkPolicy,Ingress,LimitRange,ResourceQuota"
  trivy.timeout: "5m0s"
  trivy.configFile: |
    scan:
      disable-telemetry: true
      offline: true
      scanners:
      - vuln
      show-suppressed: false
      skip-version-check: true
    vulnerability:
      ignore-status:
      - will_not_fix
      - not_affected
      severity-source:
      - redhat
      - auto
  trivy.ignoreFileName: "/etc/trivy/.trivyignore.yaml"
  trivy.serverURL: "http://trivy-service.security-system:4954"
  trivy.mode: "ClientServer"
  trivy.resources.requests.cpu: "100m"
  trivy.resources.requests.memory: "256Mi"
  trivy.resources.requests.ephemeral-storage: "100Mi"
  trivy.resources.limits.cpu: "500m"
  trivy.resources.limits.memory: "4Gi"
  trivy.resources.limits.ephemeral-storage: "2Gi"
  TRIVY_LISTEN: "0.0.0.0:4954"
  TRIVY_CACHE_DIR: "/home/scanner/.cache/trivy"
  TRIVY_DEBUG: "false"
  TRIVY_SKIP_DB_UPDATE: "false"
  TRIVY_DB_REPOSITORY: "zot.lan:5000/docker-hub-cache/aquasec/trivy-db"
  TRIVY_JAVA_DB_REPOSITORY: "zot.lan:5000/docker-hub-cache/aquasec/trivy-java-db"
  TRIVY_INSECURE: "false"
