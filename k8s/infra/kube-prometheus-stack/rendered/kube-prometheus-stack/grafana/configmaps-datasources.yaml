apiVersion: v1
data:
  datasource.yaml: |-
    apiVersion: 1
    datasources:
    - name: "Prometheus"
      type: prometheus
      uid: prometheus
      url: http://kube-prom-prometheus.kube-prometheus-stack-system:9090/
      access: proxy
      isDefault: true
      jsonData:
        httpMethod: POST
        timeInterval: 1m
    - name: "Alertmanager"
      type: alertmanager
      uid: alertmanager
      url: http://kube-prom-alertmanager.kube-prometheus-stack-system:9093/
      access: proxy
      jsonData:
        handleGrafanaManagedAlerts: false
        implementation: prometheus
kind: ConfigMap
metadata:
  labels:
    app: prom-grafana
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: prom
    app.kubernetes.io/version: 84.5.0
    chart: kube-prometheus-stack-84.5.0
    grafana_datasource: "1"
    heritage: Helm
    release: kube-prometheus-stack
  name: kube-prom-grafana-datasource
  namespace: kube-prometheus-stack-system
