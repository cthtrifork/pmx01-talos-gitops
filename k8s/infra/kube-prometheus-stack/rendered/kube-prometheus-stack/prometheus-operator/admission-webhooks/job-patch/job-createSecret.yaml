apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app: prom-admission-create
    app.kubernetes.io/component: prometheus-operator-webhook
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: prom-prometheus-operator
    app.kubernetes.io/part-of: prom
    app.kubernetes.io/version: 84.5.0
    chart: kube-prometheus-stack-84.5.0
    heritage: Helm
    release: kube-prometheus-stack
  name: kube-prom-admission-create
  namespace: kube-prometheus-stack-system
spec:
  template:
    metadata:
      labels:
        app: prom-admission-create
        app.kubernetes.io/component: prometheus-operator-webhook
        app.kubernetes.io/instance: kube-prometheus-stack
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: prom-prometheus-operator
        app.kubernetes.io/part-of: prom
        app.kubernetes.io/version: 84.5.0
        chart: kube-prometheus-stack-84.5.0
        heritage: Helm
        release: kube-prometheus-stack
      name: kube-prom-admission-create
    spec:
      containers:
      - args:
        - create
        - --host=kube-prom-operator,kube-prom-operator.kube-prometheus-stack-system.svc
        - --namespace=kube-prometheus-stack-system
        - --secret-name=kube-prom-admission
        image: ghcr.io/jkroepke/kube-webhook-certgen:1.8.2
        imagePullPolicy: IfNotPresent
        name: create
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      restartPolicy: OnFailure
      securityContext:
        runAsGroup: 2000
        runAsNonRoot: true
        runAsUser: 2000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: kube-prom-admission
  ttlSecondsAfterFinished: 60
