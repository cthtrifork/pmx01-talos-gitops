apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  labels:
    app: prom-prometheus
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: prom
    app.kubernetes.io/version: 84.5.0
    chart: kube-prometheus-stack-84.5.0
    heritage: Helm
    release: kube-prometheus-stack
  name: kube-prom-prometheus
  namespace: kube-prometheus-stack-system
spec:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - prometheus
            - key: app.kubernetes.io/instance
              operator: In
              values:
              - kube-prom-prometheus
          topologyKey: kubernetes.io/hostname
        weight: 100
  automountServiceAccountToken: true
  enableAdminAPI: false
  enableFeatures:
  - exemplar-storage
  enableOTLPReceiver: false
  enableRemoteWriteReceiver: true
  externalUrl: http://kube-prom-prometheus.kube-prometheus-stack-system:9090
  hostNetwork: false
  image: quay.io/prometheus/prometheus:v3.11.3
  imagePullPolicy: IfNotPresent
  listenLocal: false
  logFormat: logfmt
  logLevel: info
  paused: false
  podMonitorNamespaceSelector: {}
  podMonitorSelector: {}
  portName: http-web
  probeNamespaceSelector: {}
  probeSelector:
    matchLabels:
      release: kube-prometheus-stack
  replicas: 1
  resources:
    limits:
      cpu: 1000m
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 512Mi
  retention: 24h
  retentionSize: 1GiB
  routePrefix: /
  ruleNamespaceSelector: {}
  ruleSelector:
    matchExpressions:
    - key: type
      operator: In
      values:
      - rule
  scrapeConfigNamespaceSelector: {}
  scrapeConfigSelector:
    matchLabels:
      release: kube-prometheus-stack
  scrapeInterval: 1m
  scrapeTimeout: 1m
  securityContext:
    fsGroup: 2000
    runAsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  serviceAccountName: kube-prom-prometheus
  serviceMonitorNamespaceSelector: {}
  serviceMonitorSelector: {}
  shards: 1
  storage:
    volumeClaimTemplate:
      spec:
        resources:
          requests:
            storage: 5Gi
        storageClassName: local-path
  tsdb:
    outOfOrderTimeWindow: 0s
  version: v3.11.3
  walCompression: true
