apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  annotations:
    helm.toolkit.fluxcd.io/driftDetection: disabled
  labels:
    app: prom
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: prom
    app.kubernetes.io/version: 84.5.0
    chart: kube-prometheus-stack-84.5.0
    heritage: Helm
    release: kube-prometheus-stack
    type: rule
  name: kube-prom-kubelet.rules
  namespace: kube-prometheus-stack-system
spec:
  groups:
  - name: kubelet.rules
    rules:
    - expr: |-
        histogram_quantile(
          0.99,
          sum(rate(kubelet_pleg_relist_duration_seconds_bucket{job="kubelet", metrics_path="/metrics"}[5m])) by (cluster, instance, le)
          * on (cluster, instance) group_left (node)
          max by (cluster, instance, node) (kubelet_node_name{job="kubelet", metrics_path="/metrics"})
        )
      labels:
        quantile: "0.99"
      record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
    - expr: |-
        histogram_quantile(
          0.9,
          sum(rate(kubelet_pleg_relist_duration_seconds_bucket{job="kubelet", metrics_path="/metrics"}[5m])) by (cluster, instance, le)
          * on (cluster, instance) group_left (node)
          max by (cluster, instance, node) (kubelet_node_name{job="kubelet", metrics_path="/metrics"})
        )
      labels:
        quantile: "0.9"
      record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
    - expr: |-
        histogram_quantile(
          0.5,
          sum(rate(kubelet_pleg_relist_duration_seconds_bucket{job="kubelet", metrics_path="/metrics"}[5m])) by (cluster, instance, le)
          * on (cluster, instance) group_left (node)
          max by (cluster, instance, node) (kubelet_node_name{job="kubelet", metrics_path="/metrics"})
        )
      labels:
        quantile: "0.5"
      record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
