apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  annotations:
    helm.toolkit.fluxcd.io/driftDetection: disabled
  labels:
    app: prom
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: prom
    app.kubernetes.io/version: 85.2.2
    chart: kube-prometheus-stack-85.2.2
    heritage: Helm
    release: kube-prometheus-stack
    type: rule
  name: kube-prom-kubernetes-system-scheduler
  namespace: kube-prometheus-stack-system
spec:
  groups:
  - name: kubernetes-system-scheduler
    rules:
    - alert: KubeSchedulerDown
      annotations:
        description: KubeScheduler has disappeared from Prometheus target discovery.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeschedulerdown
        summary: Target disappeared from Prometheus target discovery.
      expr: absent(up{job="kube-scheduler"})
      for: 15m
      labels:
        severity: critical
    - alert: KubeSchedulerInstanceUnreachable
      annotations:
        description: A KubeScheduler instance has been unreachable for more than 15
          minutes.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeschedulerinstanceunreachable
        summary: KubeScheduler instance is unreachable.
      expr: up{job="kube-scheduler"} == 0
      for: 15m
      labels:
        severity: warning
