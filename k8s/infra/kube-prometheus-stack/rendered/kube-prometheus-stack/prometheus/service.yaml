apiVersion: v1
kind: Service
metadata:
  annotations:
    omni-kube-service-exposer.sidero.dev/label: Prometheus
    omni-kube-service-exposer.sidero.dev/port: "50087"
    omni-kube-service-exposer.sidero.dev/prefix: prometheus
  labels:
    app: prom-prometheus
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: prom
    app.kubernetes.io/version: 86.1.1
    chart: kube-prometheus-stack-86.1.1
    heritage: Helm
    release: kube-prometheus-stack
    self-monitor: "true"
  name: kube-prom-prometheus
  namespace: kube-prometheus-stack-system
spec:
  ports:
  - name: http-web
    port: 9090
    targetPort: 9090
  - appProtocol: http
    name: reloader-web
    port: 8080
    targetPort: reloader-web
  publishNotReadyAddresses: false
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: kube-prom-prometheus
  sessionAffinity: None
  type: ClusterIP
