---
# Source: metallb/charts/frr-k8s/templates/controller.yaml
# FRR expects to have these files owned by frr:frr on startup.
# Having them in a ConfigMap allows us to modify behaviors: for example enabling more daemons on startup.
apiVersion: v1
kind: ConfigMap
metadata:
  name: metallb-frr-k8s-frr-startup
  namespace: "metallb-system"
  labels:
    helm.sh/chart: frr-k8s-0.0.25
    app.kubernetes.io/name: frr-k8s
    app.kubernetes.io/instance: metallb
    app.kubernetes.io/version: "v0.0.25"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: frr-k8s
data:
  daemons: |
    # This file tells the frr package which daemons to start.
    #
    # Sample configurations for these daemons can be found in
    # /usr/share/doc/frr/examples/.
    #
    # ATTENTION:
    #
    # When activating a daemon for the first time, a config file, even if it is
    # empty, has to be present *and* be owned by the user and group "frr", else
    # the daemon will not be started by /etc/init.d/frr. The permissions should
    # be u=rw,g=r,o=.
    # When using "vtysh" such a config file is also needed. It should be owned by
    # group "frrvty" and set to ug=rw,o= though. Check /etc/pam.d/frr, too.
    #
    # The watchfrr and zebra daemons are always started.
    #
    bgpd=yes
    ospfd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    ldpd=no
    nhrpd=no
    eigrpd=no
    babeld=no
    sharpd=no
    pbrd=no
    bfdd=yes
    fabricd=no
    vrrpd=no

    #
    # If this option is set the /etc/init.d/frr script automatically loads
    # the config via "vtysh -b" when the servers are started.
    # Check /etc/pam.d/frr if you intend to use "vtysh"!
    #
    vtysh_enable=yes
    zebra_options="  -A 127.0.0.1 -K 120 -s 90000000 --limit-fds 100000"
    bgpd_options="   -A 127.0.0.1  -p 0 --limit-fds 100000"
    ospfd_options="  -A 127.0.0.1"
    ospf6d_options=" -A ::1"
    ripd_options="   -A 127.0.0.1"
    ripngd_options=" -A ::1"
    isisd_options="  -A 127.0.0.1"
    pimd_options="   -A 127.0.0.1"
    ldpd_options="   -A 127.0.0.1"
    nhrpd_options="  -A 127.0.0.1"
    eigrpd_options=" -A 127.0.0.1"
    babeld_options=" -A 127.0.0.1"
    sharpd_options=" -A 127.0.0.1"
    pbrd_options="   -A 127.0.0.1"
    staticd_options="-A 127.0.0.1 --limit-fds 100000"
    bfdd_options="   -A 127.0.0.1 --limit-fds 100000"
    fabricd_options="-A 127.0.0.1"
    vrrpd_options="  -A 127.0.0.1"

    # configuration profile
    #
    #frr_profile="traditional"
    #frr_profile="datacenter"

    #
    # This is the maximum number of FD's that will be available.
    # Upon startup this is read by the control files and ulimit
    # is called. Uncomment and use a reasonable value for your
    # setup if you are expecting a large number of peers in
    # say BGP.
    #MAX_FDS=1024

    # The list of daemons to watch is automatically generated by the init script.
    #watchfrr_options=""

    # for debugging purposes, you can specify a "wrap" command to start instead
    # of starting the daemon directly, e.g. to use valgrind on ospfd:
    #   ospfd_wrap="/usr/bin/valgrind"
    # or you can use "all_wrap" for all daemons, e.g. to use perf record:
    #   all_wrap="/usr/bin/perf record --call-graph -"
    # the normal daemon command is added to this at the end.
  vtysh.conf: |
    service integrated-vtysh-config
  frr.conf: |
    ! This file gets overriden the first time the speaker renders a config.
    ! So anything configured here is only temporary.
    frr version 8.0
    frr defaults traditional
    hostname Router
    line vty
    log stdout informational
---
# Source: metallb/charts/frr-k8s/templates/controller.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metallb-frr-k8s
  namespace: "metallb-system"
  labels:
    helm.sh/chart: frr-k8s-0.0.25
    app.kubernetes.io/name: frr-k8s
    app.kubernetes.io/instance: metallb
    app.kubernetes.io/version: "v0.0.25"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: frr-k8s
    app: "frr-k8s"
spec:
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: frr-k8s
      app.kubernetes.io/instance: metallb
      app.kubernetes.io/component: frr-k8s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frr-k8s
        app.kubernetes.io/instance: metallb
        app.kubernetes.io/component: frr-k8s
        app: "frr-k8s"
    spec:
      serviceAccountName: metallb-frr-k8s-controller
      terminationGracePeriodSeconds: 0
      hostNetwork: true
      volumes:
        - name: frr-sockets
          emptyDir: {}
        - name: frr-startup
          configMap:
            name: metallb-frr-k8s-frr-startup
        - name: frr-conf
          emptyDir: {}
        - name: reloader
          emptyDir: {}
        - name: metrics
          emptyDir: {}
        - name: frr-status
          emptyDir: {}
        - name: frr-lib
          emptyDir: {}
        - name: frr-tmp
          emptyDir: {}
      initContainers:
        # Copies the initial config files with the right permissions to the shared volume.
        - name: cp-frr-files
          image: quay.io/frrouting/frr:10.4.3
          securityContext:
            runAsUser: 100
            runAsGroup: 101
          command: ["/bin/sh", "-c", "cp -rLf /tmp/frr/* /etc/frr/"]
          volumeMounts:
            - name: frr-startup
              mountPath: /tmp/frr
            - name: frr-conf
              mountPath: /etc/frr
        # Copies the reloader to the shared volume between the speaker and reloader.
        - name: cp-reloader
          image: quay.io/metallb/frr-k8s:v0.0.25
          command: ["/bin/sh", "-c", "cp -f /frr-reloader.sh /etc/frr_reloader/"]
          volumeMounts:
            - name: reloader
              mountPath: /etc/frr_reloader
        # Copies the metrics exporter
        - name: cp-metrics
          image: quay.io/metallb/frr-k8s:v0.0.25
          command: ["/bin/sh", "-c", "cp -f /frr-metrics /etc/frr_metrics/"]
          volumeMounts:
            - name: metrics
              mountPath: /etc/frr_metrics
        - name: cp-frr-status
          image: quay.io/metallb/frr-k8s:v0.0.25
          command: ["/bin/sh", "-c", "cp -f /frr-status /etc/frr_status/"]
          volumeMounts:
            - name: frr-status
              mountPath: /etc/frr_status
      shareProcessNamespace: true
      containers:
        - name: controller
          image: quay.io/metallb/frr-k8s:v0.0.25
          command:
            - /frr-k8s
          args:
            - "--node-name=$(NODE_NAME)"
            - "--namespace=$(NAMESPACE)"
            - "--metrics-bind-address=0.0.0.0:9140"
            - --log-level=info
          env:
            - name: FRR_CONFIG_FILE
              value: /etc/frr_reloader/frr.conf
            - name: FRR_RELOADER_PID_FILE
              value: /etc/frr_reloader/reloader.pid
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9140
              name: metricshttps
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7572
              host: 127.0.0.1
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 7572
              host: 127.0.0.1
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
          volumeMounts:
            - name: reloader
              mountPath: /etc/frr_reloader
        - name: frr
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_ADMIN
                - NET_BIND_SERVICE
          image: quay.io/frrouting/frr:10.4.3
          env:
            - name: TINI_SUBREAPER
              value: "true"
          volumeMounts:
            - name: frr-sockets
              mountPath: /var/run/frr
            - name: frr-conf
              mountPath: /etc/frr
            - name: frr-lib
              mountPath: /var/lib/frr
            - name: frr-tmp
              mountPath: /var/tmp/frr
          command:
            - /bin/sh
            - -c
            - /sbin/tini -- /usr/lib/frr/docker-start
          livenessProbe:
            httpGet:
              path: /livez
              port: 9141
              scheme: HTTPS
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /livez
              port: 9141
              scheme: HTTPS
            failureThreshold: 30
            periodSeconds: 5
        - name: reloader
          image: quay.io/frrouting/frr:10.4.3
          command: ["/etc/frr_reloader/frr-reloader.sh"]
          volumeMounts:
            - name: frr-sockets
              mountPath: /var/run/frr
            - name: frr-conf
              mountPath: /etc/frr
            - name: reloader
              mountPath: /etc/frr_reloader
        - name: frr-metrics
          image: quay.io/frrouting/frr:10.4.3
          command: ["/etc/frr_metrics/frr-metrics"]
          args:
            - --metrics-port=9141
            - --metrics-bind-address=0.0.0.0
          ports:
            - containerPort: 9141
              name: frrmetricshttps
          volumeMounts:
            - name: frr-sockets
              mountPath: /var/run/frr
            - name: frr-conf
              mountPath: /etc/frr
            - name: metrics
              mountPath: /etc/frr_metrics
        - name: frr-status
          args:
            - --node-name=$(NODE_NAME)
            - --namespace=$(NAMESPACE)
            - --pod-name=$(POD_NAME)
            - --log-level=info
            - --poll-interval=2m
          command:
            - /etc/frr_status/frr-status
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          image: quay.io/frrouting/frr:10.4.3
          volumeMounts:
            - mountPath: /var/run/frr
              name: frr-sockets
            - mountPath: /etc/frr
              name: frr-conf
            - mountPath: /etc/frr_status
              name: frr-status
      nodeSelector:
        "kubernetes.io/os": linux
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
          operator: Exists
