---
# Source: metallb/charts/frr-k8s/templates/status-cleaner.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metallb-frr-k8s-statuscleaner
  namespace: "metallb-system"
  labels:
    helm.sh/chart: frr-k8s-0.0.25
    app.kubernetes.io/name: frr-k8s
    app.kubernetes.io/instance: metallb
    app.kubernetes.io/version: "v0.0.25"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: statuscleaner
    app: "frr-k8s"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: statuscleaner
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: frr-k8s-statuscleaner
      labels:
        app.kubernetes.io/component: statuscleaner
    spec:
      containers:
        - command:
            - /statuscleaner
          args:
            - --webhook-port=19443
            - --log-level=info
            - "--namespace=$(NAMESPACE)"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: quay.io/metallb/frr-k8s:v0.0.25
          name: frr-k8s-statuscleaner
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 19443
              name: webhook
          livenessProbe:
            httpGet:
              path: /healthz
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
          operator: Exists
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: frr-k8s-webhook-server-cert
      serviceAccountName: metallb-frr-k8s-controller
      terminationGracePeriodSeconds: 10
      hostNetwork: true
