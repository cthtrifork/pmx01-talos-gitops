# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 30m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: metallb
  driftDetection:
    mode: enabled
  # https://github.com/metallb/metallb/blob/main/charts/metallb/values.yaml
  values:
    crds:
      enabled: true
    frr-k8s:
      prometheus:
        serviceMonitor:
          enabled: false
    controller:
      tolerations:
        # Tolerate the control plane taint
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 10m
          memory: 128Mi
    speaker:
      tolerations:
        # Tolerate the control plane taint
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 25m
          memory: 128Mi
