---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: storage-system
spec:
  interval: 30m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: cnpg
  driftDetection:
    mode: enabled
  install:
    strategy:
      name: RetryOnFailure
  # https://github.com/cloudnative-pg/charts/blob/main/charts/cloudnative-pg/values.yaml
  values:
    replicaCount: 2
    priorityClassName: system-cluster-critical
    crds:
      create: true
    config:
      clusterWide: true
   #  data:
   #     INHERITED_LABELS: portableinfo.cloud/*
    monitoring:
      podMonitorEnabled: true
    resources:
      limits:
        memory: 200Mi
      requests:
        cpu: 30m
        memory: 48Mi
