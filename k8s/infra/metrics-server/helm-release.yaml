# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: metrics-server
      version: 3.13.0
      sourceRef:
        kind: HelmRepository
        name: metrics-server
      interval: 12h
  driftDetection:
    mode: enabled
  # https://github.com/kubernetes-sigs/metrics-server/blob/master/charts/metrics-server/values.yaml
  values:
    args:
      - --kubelet-insecure-tls
      - --kubelet-preferred-address-types=InternalIP
      - --metric-resolution=30s
      - --kubelet-request-timeout=20s
    serviceMonitor:
      enabled: false
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 100m
        memory: 200Mi
    livenessProbe:
      failureThreshold: 15
      initialDelaySeconds: 60
      timeoutSeconds: 10
    readinessProbe:
      failureThreshold: 15
      initialDelaySeconds: 60
      timeoutSeconds: 10
    tolerations:
      # Tolerate the control plane taint
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
