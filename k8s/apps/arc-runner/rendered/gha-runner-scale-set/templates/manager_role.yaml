apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  finalizers:
  - actions.github.com/cleanup-protection
  labels:
    actions.github.com/scale-set-name: arc-ubuntu
    actions.github.com/scale-set-namespace: arc-runners-system
    app.kubernetes.io/component: manager-role
    app.kubernetes.io/instance: arc-ubuntu
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: arc-ubuntu
    app.kubernetes.io/part-of: gha-rs
    app.kubernetes.io/version: 0.14.1
    helm.sh/chart: gha-rs-0.14.1
  name: arc-ubuntu-gha-rs-manager
  namespace: arc-runners-system
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
- apiGroups:
  - ""
  resources:
  - pods/status
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  verbs:
  - create
  - delete
  - get
  - patch
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  verbs:
  - create
  - delete
  - get
  - patch
  - update
