apiVersion: actions.github.com/v1alpha1
kind: AutoscalingRunnerSet
metadata:
  annotations:
    actions.github.com/cleanup-manager-role-binding: arc-ubuntu-gha-rs-manager
    actions.github.com/cleanup-manager-role-name: arc-ubuntu-gha-rs-manager
    actions.github.com/cleanup-no-permission-service-account-name: arc-ubuntu-gha-rs-no-permission
    actions.github.com/values-hash: b7fcf7a4175c5748af02f15159255fed5a799eb90a90d6e70a97d64b755febd
  labels:
    actions.github.com/scale-set-name: arc-ubuntu
    actions.github.com/scale-set-namespace: arc-runners-system
    app.kubernetes.io/component: autoscaling-runner-set
    app.kubernetes.io/instance: arc-ubuntu
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: arc-ubuntu
    app.kubernetes.io/part-of: gha-rs
    app.kubernetes.io/version: 0.14.1
    helm.sh/chart: gha-rs-0.14.1
  name: arc-ubuntu
  namespace: arc-runners-system
spec:
  githubConfigSecret: github-auth
  githubConfigUrl: https://github.com/cthtrifork/homeserver-bootc
  listenerTemplate:
    spec:
      containers:
      - name: listener
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 15m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
  maxRunners: 1
  minRunners: 0
  runnerScaleSetName: arc-ubuntu
  template:
    spec:
      containers:
      - command:
        - /home/runner/run.sh
        env:
        - name: DOCKER_HOST
          value: unix:///var/run/docker.sock
        - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
          value: "120"
        - name: STORAGE_DRIVER
          value: overlay
        - name: BUILDAH_ISOLATION
          value: chroot
        - name: BUILDAH_LAYERS
          value: "true"
        image: ghcr.io/cthtrifork/pmx01-talos-gitops/github-actions-runner:v0.2.0@sha256:c72a6fe83b3e0ba38acff0d39cd2ffb004ed1aa9cb274a8f1dea6ab7fcffe537
        imagePullPolicy: IfNotPresent
        name: runner
        resources:
          limits:
            cpu: 4000m
            memory: 16Gi
          requests:
            cpu: 500m
            memory: 2Gi
        securityContext:
          privileged: true
          runAsGroup: 1001
          runAsUser: 1001
          seLinuxOptions:
            type: container_file_t
        volumeMounts:
        - mountPath: /var/lib/containers
          name: container-storage
        - mountPath: /home/runner/_work
          name: work
        - mountPath: /var/run
          name: dind-sock
        - mountPath: /home/runner/.local/share/containers
          name: container-rootless-storage
        - mountPath: /var/lib/shared
          name: container-shared-storage
        - mountPath: /var/lib/registry
          name: container-shared-registry
        - mountPath: /var/lib/docker
          name: docker-lib
        - mountPath: /var/cache/dnf
          name: dnf-cache
        - mountPath: /home/runner/.cache/dnf
          name: dnf-cache
        - mountPath: /runner/cache
          name: tmp-cache
      imagePullSecrets:
      - name: github-auth
      initContainers:
      - args:
        - |
          set -e
          find /mnt/cache -type f -mtime +14 -print -delete
          find /mnt/cache -type d -empty -mtime +14 -print -delete || true
        command:
        - /bin/sh
        - -c
        image: ghcr.io/cthtrifork/pmx01-talos-gitops/github-actions-runner:v0.2.0@sha256:c72a6fe83b3e0ba38acff0d39cd2ffb004ed1aa9cb274a8f1dea6ab7fcffe537
        imagePullPolicy: IfNotPresent
        name: data-retention
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 25m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: true
          privileged: true
          runAsGroup: 0
          runAsUser: 0
        volumeMounts:
        - mountPath: /mnt/cache
          name: tmp-cache
      - args:
        - |
          set -eux
          # Create if missing and set perms/ownership (idempotent)
          install -d -m 0775 -o 1001 -g 1001 /mnt/dnf
          install -d -m 0775 -o 1001 -g 1001 /mnt/rootless
          # Also fix subpaths if they already exist
          chown -R 1001:1001 /mnt/dnf /mnt/rootless || true
          chmod 0775 /mnt/dnf /mnt/rootless || true
          # Feed existing data into the mounted volumes
          cp -r /home/runner/.local/share/containers /mnt/rootless || true
        command:
        - /bin/sh
        - -c
        image: ghcr.io/cthtrifork/pmx01-talos-gitops/github-actions-runner:v0.2.0@sha256:c72a6fe83b3e0ba38acff0d39cd2ffb004ed1aa9cb274a8f1dea6ab7fcffe537
        imagePullPolicy: IfNotPresent
        name: fix-perms
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 25m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: true
          privileged: true
          runAsGroup: 0
          runAsUser: 0
        volumeMounts:
        - mountPath: /mnt/dnf
          name: dnf-cache
        - mountPath: /mnt/rootless
          name: container-rootless-storage
      - command:
        - cp
        - -r
        - /home/runner/externals/.
        - /home/runner/tmpDir/
        image: ghcr.io/actions/actions-runner:2.334.0@sha256:b6614fce332517f74d0a76e7c762fb08e4f2ff13dcf333183397c8a5725b6e8e
        name: init-dind-externals
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 25m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsGroup: 1001
          runAsNonRoot: true
          runAsUser: 1001
        volumeMounts:
        - mountPath: /home/runner/tmpDir
          name: dind-externals
      - args:
        - dockerd
        - --host=unix:///var/run/docker.sock
        - --group=$(DOCKER_GROUP_GID)
        env:
        - name: DOCKER_GROUP_GID
          value: "123"
        image: docker.io/library/docker:29.4.1-dind@sha256:c77e5d7912f9b137cc67051fdc2991d8f5ae22c55ddf532bb836dcb693a04940
        imagePullPolicy: IfNotPresent
        name: dind
        resources:
          limits:
            memory: 5Gi
          requests:
            cpu: 200m
            memory: 1Gi
        restartPolicy: Always
        securityContext:
          privileged: true
        startupProbe:
          exec:
            command:
            - docker
            - info
          failureThreshold: 24
          initialDelaySeconds: 0
          periodSeconds: 5
        volumeMounts:
        - mountPath: /home/runner/_work
          name: work
        - mountPath: /var/run
          name: dind-sock
        - mountPath: /home/runner/externals
          name: dind-externals
        - mountPath: /var/lib/docker
          name: docker-lib
      restartPolicy: Never
      securityContext:
        fsGroup: 1001
      serviceAccountName: arc-ubuntu-gha-rs-no-permission
      volumes:
      - ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 32Gi
        name: work
      - ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
        name: dind-sock
      - ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi
        name: dind-externals
      - emptyDir: {}
        name: docker-lib
      - ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 32Gi
        name: container-storage
      - ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 16Gi
        name: container-rootless-storage
      - hostPath:
          path: /var/mnt/local-storage-cache/gha-cache/dnf
          type: DirectoryOrCreate
        name: dnf-cache
      - name: container-shared-storage
        persistentVolumeClaim:
          claimName: container-shared-storage2
      - name: container-shared-registry
        persistentVolumeClaim:
          claimName: container-shared-registry2
      - name: tmp-cache
        persistentVolumeClaim:
          claimName: tmp-cache
