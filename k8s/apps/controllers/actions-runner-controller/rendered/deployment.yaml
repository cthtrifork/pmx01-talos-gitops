---
# Source: gha-runner-scale-set-controller/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gha-runner-scale-set-controller-gha-rs-controller
  namespace: arc-controller-system
  labels:
    helm.sh/chart: gha-rs-controller-0.14.1
    app.kubernetes.io/name: gha-rs-controller
    app.kubernetes.io/namespace: arc-controller-system
    app.kubernetes.io/instance: gha-runner-scale-set-controller
    app.kubernetes.io/version: "0.14.1"
    app.kubernetes.io/part-of: gha-rs-controller
    app.kubernetes.io/managed-by: Helm
    actions.github.com/controller-service-account-namespace: arc-controller-system
    actions.github.com/controller-service-account-name: gha-runner-scale-set-controller-gha-rs-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gha-rs-controller
      app.kubernetes.io/namespace: arc-controller-system
      app.kubernetes.io/instance: gha-runner-scale-set-controller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: "manager"
      labels:
        app.kubernetes.io/part-of: gha-rs-controller
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/version: 0.14.1
        app.kubernetes.io/name: gha-rs-controller
        app.kubernetes.io/namespace: arc-controller-system
        app.kubernetes.io/instance: gha-runner-scale-set-controller
    spec:
      serviceAccountName: gha-runner-scale-set-controller-gha-rs-controller
      securityContext:
        fsGroup: 2000
      containers:
        - name: manager
          image: "ghcr.io/actions/gha-runner-scale-set-controller:0.14.1"
          imagePullPolicy: IfNotPresent
          args:
            - "--auto-scaling-runner-set-only"
            - "--log-level=debug"
            - "--log-format=text"
            - "--runner-max-concurrent-reconciles=2"
            - "--update-strategy=eventual"
            - "--listener-metrics-addr=0"
            - "--listener-metrics-endpoint="
            - "--metrics-addr=0"
          command:
            - "/manager"
          env:
            - name: CONTROLLER_MANAGER_CONTAINER_IMAGE
              value: "ghcr.io/actions/gha-runner-scale-set-controller:0.14.1"
            - name: CONTROLLER_MANAGER_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      terminationGracePeriodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
