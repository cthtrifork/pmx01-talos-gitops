apiVersion: v1
kind: Config
clusters:
  - cluster:
      server: https://portableinfo.kubernetes.eu-central-1.omni.siderolabs.io
    name: portableinfo-homeserver
contexts:
  - context:
      cluster: portableinfo-homeserver
      namespace: default
      user: portableinfo-homeserver-caspert@gmail.com
    name: portableinfo-homeserver
current-context: portableinfo-homeserver
users:
- name: portableinfo-homeserver-caspert@gmail.com
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1
      args:
        - oidc-login
        - get-token
        - --oidc-issuer-url=https://portableinfo.eu-central-1.omni.siderolabs.io/oidc
        - --oidc-client-id=native
        - --oidc-extra-scope=cluster:homeserver
      command: kubectl
      env: null
      interactiveMode: IfAvailable
      provideClusterInfo: false
