name: Publish to Github
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'image tag prefix'
        default: 'rc'
        required: true

permissions:
  contents: read

env:
    RUNNER_VERSION: "2.333.1" # renovate: datasource=github-releases depName=actions/runner

jobs:
    publish-images:
        outputs:
            image_url: ${{ steps.slsa.outputs.image_url }}
            image_digest: ${{ steps.slsa.outputs.image_digest }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # for creating OIDC tokens for signing.
            packages: write # for pushing and signing container images.
        strategy:
            matrix:
                image:
                    - name: github-actions-runner
                      containerfile: images/github-actions-runner/Dockerfile
                      context: images/github-actions-runner
                      registryurl: ghcr.io/${{ github.repository }}/github-actions-runner
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Prepare
              id: prep
              run: |
                VERSION="${{ github.event.inputs.tag }}-${GITHUB_SHA::8}"
                if [[ $GITHUB_REF == refs/tags/* ]]; then
                    VERSION=${GITHUB_REF/refs\/tags\//}
                fi
                echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
                echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

            - name: Set up QEMU
              uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: Generate images meta
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
              with:
                images: |
                  ${{ matrix.image.registryurl }}
                tags: |
                  type=raw,value=${{ steps.prep.outputs.VERSION }}

            - name: Log in to the Container registry
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
              id: build-push
              with:
                  context: ./${{ matrix.image.context }}
                  file: ./${{ matrix.image.containerfile }}
                  platforms: linux/amd64
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  sbom: true
                  provenance: true
                  build-args: |
                      DOCKER_METADATA_OUTPUT_VERSION
                      RUNNER_VERSION=${{ env.RUNNER_VERSION }}
                      VERSION=${{ steps.prep.outputs.VERSION }}
       
            - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
            - name: Sign images
              env:
                COSIGN_EXPERIMENTAL: 1
              run: |
                cosign sign --yes ${{ matrix.image.registryurl }}@${{ steps.build-push.outputs.digest }}

            - name: Generate SLSA metadata
              id: slsa
              run: |
                image_url=${{ matrix.image.registryurl }}:${{ steps.prep.outputs.VERSION }}
                echo "image_url=$image_url" >> $GITHUB_OUTPUT
            
                image_digest=${{ steps.build-push.outputs.digest }}
                echo "image_digest=$image_digest" >> $GITHUB_OUTPUT

    ghcr-provenance:
        needs: [publish-images]
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            actions: read # for detecting the Github Actions environment.
            id-token: write # for creating OIDC tokens for signing.
            packages: write # for uploading attestations.
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
        with:
            image: ${{ needs.publish-images.outputs.image_url }}
            digest: ${{ needs.publish-images.outputs.image_digest }}
            registry-username: ${{ github.actor }}
        secrets:
            registry-password: ${{ secrets.GITHUB_TOKEN }}