name: Publish to Github
on:
    workflow_dispatch:
    push:
        paths:
            - "images/**"
            - "images/**/**"
            - ".github/workflows/build-image.yaml"
        branches:
            - main
        tags:
            - v*.*.*
    # pull_request:
    #   branches:
    #     - main

env:
    RUNNER_VERSION: "2.333.1" # renovate: datasource=github-releases depName=actions/runner

jobs:
    publish-images:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            matrix:
                image:
                    - name: github-actions-runner
                      containerfile: images/github-actions-runner/Dockerfile
                      context: images/github-actions-runner
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up QEMU
              uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
              with:
                  images: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}
                  tags: |
                      # default tags
                      type=schedule
                      type=ref,event=branch
                      type=ref,event=tag
                      type=ref,event=pr
                      # set latest tag for default branch
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=raw,value=0.1.${{ github.run_number }}

            - name: Log in to the Container registry
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
              with:
                  context: ./${{ matrix.image.context }}
                  file: ./${{ matrix.image.containerfile }}
                  platforms: linux/amd64
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: false
                  build-args: |
                      DOCKER_METADATA_OUTPUT_VERSION
                      RUNNER_VERSION=${{ env.RUNNER_VERSION }}
       
