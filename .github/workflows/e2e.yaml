name: e2e

on:
  workflow_dispatch:
  push:
    branches: [ '*' ]
    tags-ignore: [ '*' ]

permissions:
  contents: read

env:
  CILIUM_CLI_VERSION: v0.19.2 # renovate: datasource=github-releases depName=cilium/cilium-cli
  CILIUM_VERSION: v1.19.2 # renovate: datasource=github-releases depName=cilium/cilium
  INTERACTIVE: false

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Setup Flux Operator CLI
        uses: controlplaneio-fluxcd/flux-operator/actions/setup@c5505a455515f0ea78e04ff6f380cba8fe42a357 # v0.45.1
      - name: Setup Kubernetes Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: scripts/kind.yaml
          cluster_name: pmx-talos
      - name: Setup cilium
        run: |
         helm repo add cilium https://helm.cilium.io/
         docker pull quay.io/cilium/cilium:${CILIUM_VERSION}
         kind load docker-image quay.io/cilium/cilium:${CILIUM_VERSION} --name pmx-talos
         helm install cilium cilium/cilium --version ${CILIUM_VERSION#v} \
          --namespace kube-system \
          --set image.pullPolicy=IfNotPresent \
          --set ipam.mode=kubernetes \
          --set kubeProxyReplacement=true
        env:
          CILIUM_VERSION: ${{env.CILIUM_VERSION}}

      - name: Install cilium CLI
        run: |
          CLI_ARCH=amd64
          if [ "$(uname -m)" = "aarch64" ]; then CLI_ARCH=arm64; fi
          curl -L --fail https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${CLI_ARCH}.tar.gz
          sudo tar xzvfC cilium-linux-${CLI_ARCH}.tar.gz /usr/local/bin
          rm cilium-linux-${CLI_ARCH}.tar.gz
        env:
          CILIUM_CLI_VERSION: ${{env.CILIUM_CLI_VERSION}}

      - name: Wait for cilium
        run: cilium status --wait

      - name: Install latest flux-operator
        run: |
          helm install flux-operator oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator \
          --namespace flux-system \
          --create-namespace \
          --wait
      - name: Deploy flux instance
        run: |
          kubectl apply -f clusters/pmx01-talos-gitops/flux-instance.yaml
      - name: Verify flux instance is ready
        run: |
          kubectl wait --for=condition=Ready fluxinstance flux -n flux-system --timeout=5m

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: 'latest'

      - name: Wait for successful reconciliation
        run: |
          flux reconcile kustomization flux-system --context="${CONTEXT}" --timeout="${TIMEOUT}"
          kubectl wait --for=condition=Ready kustomization flux-system -n flux-system --timeout=5m

      - name: List deployed resources
        run: flux tree ks flux-system
      - name: Debug failure
        if: failure()
        run: |
          kubectl -n flux-system get all
          kubectl -n flux-system logs deploy/source-controller
          kubectl -n flux-system logs deploy/kustomize-controller
          kubectl -n flux-system logs deploy/helm-controller
          flux get all --all-namespaces