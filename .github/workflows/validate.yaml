name: test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ '*' ]
    tags-ignore: [ '*' ]

permissions:
    contents: read

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup yq
        uses: fluxcd/pkg/actions/yq@f50d6110eaf9d087122148fa8d95d1f509d53634 # main
      - name: Setup kubeconform
        uses: fluxcd/pkg/actions/kubeconform@f50d6110eaf9d087122148fa8d95d1f509d53634 # main
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@f50d6110eaf9d087122148fa8d95d1f509d53634 # main
      - name: Validate manifests -- /apps
        run: ./scripts/validate.sh --dir apps
      - name: Validate manifests -- /infra
        run: ./scripts/validate.sh --dir infra
      - name: Validate manifests -- /clusters
        run: ./scripts/validate.sh --dir clusters