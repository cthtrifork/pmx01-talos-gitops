name: test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ '*' ]
    tags-ignore: [ '*' ]

permissions:
    contents: read

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup yq
        uses: fluxcd/pkg/actions/yq@16ad8e2af20bd49c977385468c5bccc677521651 # main
      - name: Setup kubeconform
        uses: fluxcd/pkg/actions/kubeconform@16ad8e2af20bd49c977385468c5bccc677521651 # main
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@16ad8e2af20bd49c977385468c5bccc677521651 # main
      - name: Validate manifests -- /apps
        run: ./scripts/validate.sh --dir apps
      - name: Validate manifests -- /infra
        run: ./scripts/validate.sh --dir infra
      - name: Validate manifests -- /clusters
        run: ./scripts/validate.sh --dir clusters