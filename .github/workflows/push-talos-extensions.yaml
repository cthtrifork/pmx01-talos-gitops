name: Push Talos zot extension

on:
  pull_request:
    branches:
      - main
    paths:
      - images/talos-zot-extension/**
  push:
    branches:
      - main
    paths:
      - images/talos-zot-extension/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: talos-zot-extension
  ZOT_VERSION: v2.1.16 # renovate: datasource=github-releases depName=project-zot/zot
  TALOS_VERSION: v1.13.2 # renovate: datasource=github-releases depName=siderolabs/talos
  ARCH: amd64
  IMAGE: ghcr.io/${{ github.repository }}/talos-zot-extension

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image metadata
        id: meta
        run: |
          VERSION="${ZOT_VERSION#v}"

          {
            echo "image=${IMAGE}/app"
            echo "version=${VERSION}"
            echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "revision=${GITHUB_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: replace VERSION in ext manifest
        run: sed -i "s/VERSION/${ZOT_VERSION#v}/g" images/talos-zot-extension/manifest.yaml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push extension image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: images/talos-zot-extension
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ZOT_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.title=Talos zot system extension
            org.opencontainers.image.description=zot OCI registry packaged as a Talos system extension
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}

      - name: Create Installer
        if: ${{ github.event_name != 'pull_request' }}
        env:
          IMAGE_EXT: ${{env.IMAGE}}/app:${{ steps.meta.outputs.version }}-${{ env.TALOS_VERSION }}-${{ env.ARCH }}@${{ steps.build.outputs.digest }}
          PROFILE: installer
        run: |
          docker run --rm -t -v /dev:/dev --privileged -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} -v "$PWD/_out:/out" \
            "ghcr.io/siderolabs/imager:${{ env.TALOS_VERSION }}" --arch "${ARCH}" \
            --system-extension-image ${IMAGE_EXT} "${PROFILE}"

      - name: Push installer
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker load -i ./_out/installer-${ARCH}.tar
          docker tag ghcr.io/siderolabs/installer-base:${{ env.TALOS_VERSION }} ${IMAGE}/installer:${TALOS_VERSION}
          docker push ${IMAGE}/installer:${TALOS_VERSION}

      - name: Create ISO
        if: false
        #if: ${{ github.event_name != 'pull_request' }}
        env:
          IMAGE_EXT: ${{env.IMAGE}}/app:${{ env.TALOS_VERSION }}-${{ env.ARCH }}
          PROFILE: iso
        run: |
          docker run --rm -t -v /dev:/dev --privileged -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} -v "$PWD/_out:/out" \
            "ghcr.io/siderolabs/imager:${{ env.TALOS_VERSION }}" --arch "${ARCH}" \
            --system-extension-image ${IMAGE_EXT} "${PROFILE}"

      - name: Upload a Build Artifact
        if: false
        #if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.TALOS_VERSION }}-${{ env.ARCH }}.iso"
          path: "_out/metal-${{ env.ARCH }}.iso"
