---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reports-server-postgres
  namespace: policy-system
spec:
  interval: 30m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: cnpg-cluster
  driftDetection:
    mode: enabled
  install:
    strategy:
      name: RetryOnFailure
  # https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/values.yaml
  values:
    mode: standalone
    type: postgresql
    cluster:
      storage:
        size: 8Gi
        storageClass: "local-path"
      clusterName: reports-server-postgres
      instances: 1
      certificates:
        serverTLSSecret: reportsdb-server-cert
        serverCASecret: reportsdb-server-cert
        clientCASecret: reportsdb-client-cert
        replicationTLSSecret: reportsdb-client-cert
      priorityClassName: system-cluster-critical
      monitoring:
        enabled: true
        prometheusRule:
          enabled: false
        podMonitor:
          enabled: true
          # Change the cluster label to avoid conflict with the o11y-appended cluster label.
          metricRelabelings:
            - action: replace
              regex: (.*)
              sourceLabels:
                - cluster
              targetLabel: cnpg_cluster
            - action: labeldrop
              regex: cluster
      resources:
        limits:
          memory: 200Mi
        requests:
          cpu: 30m
          memory: 48Mi
      initdb:
          database: reportsdb
          owner: reportsdb
          secret:
            name: reportsdb-postgresql
          options: []
          encoding: UTF8
          # postInitSQL:
          #  - CREATE EXTENSION IF NOT EXISTS vector;
          postInitApplicationSQL: []
          postInitTemplateSQL: []
      enableSuperuserAccess: false
      superuserSecret: ""
      postgresql:
        parameters:
          max_connections: "1024"
      roles:
        - name: reportsdb
          ensure: present
          comment: "reportsdb user"
          login: true
          superuser: false
          inRoles:
            - pg_monitor
            - pg_signal_backend
          passwordSecret:
            name: reportsdb-postgresql

