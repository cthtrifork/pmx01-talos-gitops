---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: registry-system
spec:
  #chartRef:
  #  kind: OCIRepository
  #  name: zot
  chart:
    spec:
      chart: zot
      version: '6.5.*'
      sourceRef:
        kind: HelmRepository
        name: zot
      interval: 5m
  releaseName: zot
  driftDetection:
    mode: enabled
  interval: 30m
  timeout: 10m
  install:
    disableWait: true
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
  upgrade:
    crds: CreateReplace
    disableWait: true
    cleanupOnFail: true
    remediation:
      retries: 3
  # https://github.com/project-zot/helm-charts/blob/main/charts/zot/values.yaml
  values:
