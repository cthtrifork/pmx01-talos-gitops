---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
  namespace: registry-system
spec:
  chartRef:
    kind: OCIRepository
    name: spegel
  driftDetection:
    mode: enabled
  interval: 30m
  timeout: 10m
  install:
    disableWait: true
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
  upgrade:
    crds: CreateReplace
    disableWait: true
    cleanupOnFail: true
    remediation:
      retries: 3
  # https://github.com/spegel-org/spegel/blob/main/charts/spegel/values.yaml
  values:
    spegel:
      containerdRegistryConfigPath: /etc/cri/conf.d/hosts
      #additionalMirrorTargets:
      #  - https://zot.example.com
